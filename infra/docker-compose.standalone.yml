# ═══════════════════════════════════════════════════════════════════════════
# Twin Engine — Standalone Compose (all-in-one dev / single-host)
# ═══════════════════════════════════════════════════════════════════════════
#
# Usage:
#   docker compose -f infra/docker-compose.standalone.yml up -d
#
# Migrations (reviewed .sql — run deliberately, NOT on every up):
#   docker compose -f infra/docker-compose.standalone.yml --profile migrate run --rm migrate
#
# Langfuse is NOT bundled here — it has its own docker-compose.yml
# (requires ClickHouse).  Set LANGFUSE_* env vars to point at it.
#
# For orchestra (shared-infra) mode, see docker-compose.with-orchestra.yml.
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ── Infrastructure ─────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-twinengine}
      POSTGRES_USER: ${POSTGRES_USER:-undre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-undre}
      HONCHO_DB: ${HONCHO_DB:-honcho}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-honcho-db.sh:/docker-entrypoint-initdb.d/init-honcho-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-undre} -d ${POSTGRES_DB:-twinengine}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  embedding-adapter:
    build:
      context: ..
      dockerfile: packages/embedding-adapter/Dockerfile
    expose:
      - "8095"
    env_file: .env
    environment:
      PORT: 8095
      HOST: 0.0.0.0
      EMBEDDING_PROVIDER: jina
      RERANK_PROVIDER: jina
      JINA_API_KEY: ${JINA_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8095/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  honcho:
    image: ghcr.io/plastic-labs/honcho:v3.0.9
    ports:
      - "${HONCHO_PORT:-8083}:8080"
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://${POSTGRES_USER:-undre}:${POSTGRES_PASSWORD:-undre}@postgres:5432/${HONCHO_DB:-honcho}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && exec fastapi run --host 0.0.0.0 src/main.py"]
    restart: unless-stopped

  # NOTE: hermes-agent is NOT a service. Per spec 010 research §i, it's a local
  # CLI (`hermes acp`, JSON-RPC over stdio) the engine spawns as a subprocess,
  # process-per-tenant (T000d: native memory is process-global → cross-tenant
  # leak otherwise). The binary must be on PATH inside the engine image; it is
  # driven via HERMES_ACP_CMD, not reached over HTTP.

  # ── Optional: one-shot migration runner ────────────────────────────────

  migrate:
    image: node:20-alpine
    profiles: ["migrate"]
    working_dir: /app
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-undre}:${POSTGRES_PASSWORD:-undre}@postgres:5432/${POSTGRES_DB:-twinengine}
    volumes:
      - ..:/app:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "sh", "-c",
        "npm install -g pnpm && pnpm install && pnpm --filter @undrecreaitwins/core exec drizzle-kit push",
      ]

  # ── Engine Services ────────────────────────────────────────────────────

  twin-engine-api:
    build:
      context: ..
      dockerfile: packages/api/Dockerfile
    ports:
      - "${PORT:-8090}:8090"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-undre}:${POSTGRES_PASSWORD:-undre}@postgres:5432/${POSTGRES_DB:-twinengine}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      EMBEDDINGS_URL: http://embedding-adapter:8095
      RERANK_URL: http://embedding-adapter:8095
      HONCHO_URL: http://honcho:8080
      DOTENV_CONFIG_AUTOLOAD: "false"
      TWIN_AUTH_STATIC_TOKEN: "${TWIN_AUTH_STATIC_TOKEN:-twin-engine-secret-token}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8090/v1/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  document-worker:
    build:
      context: ..
      dockerfile: packages/training/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-undre}:${POSTGRES_PASSWORD:-undre}@postgres:5432/${POSTGRES_DB:-twinengine}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      EMBEDDINGS_URL: http://embedding-adapter:8095
      RERANK_URL: http://embedding-adapter:8095
      DOTENV_CONFIG_AUTOLOAD: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # TODO: reengagement-worker needs its own entry point script.
  # The worker class lives in packages/core/src/services/reengagement/worker.ts
  # but has no standalone CLI entry (no Dockerfile, no src/bin/reengage.ts).
  # Uncomment once T0XX creates the entry point.
  #
  # reengagement-worker:
  #   build:
  #     context: ..
  #     dockerfile: packages/core/Dockerfile        # TODO: create dedicated Dockerfile
  #   command: ["node", "packages/core/dist/bin/reengage.js"]
  #   env_file: .env
  #   environment:
  #     DATABASE_URL: postgresql://${POSTGRES_USER:-undre}:${POSTGRES_PASSWORD:-undre}@postgres:5432/${POSTGRES_DB:-twinengine}
  #     REDIS_URL: redis://redis:6379
  #     LLM_PROVIDER_URL: ${LLM_PROVIDER_URL}
  #     TWIN_REENGAGE_CLAIM_TIMEOUT_MS: ${TWIN_REENGAGE_CLAIM_TIMEOUT_MS:-300000}
  #     TWIN_REENGAGE_LLM_TIMEOUT_MS: ${TWIN_REENGAGE_LLM_TIMEOUT_MS:-30000}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   deploy:
  #     replicas: ${TWIN_REENGAGE_WORKERS:-4}
  #   restart: unless-stopped

  # ── Channel Adapters ───────────────────────────────────────────────────

  channel-telegram:
    build:
      context: ..
      dockerfile: packages/channel-telegram/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    command:
      [
        "node", "packages/channel-telegram/dist/index.js",
        "--channel-id", "${TELEGRAM_CHANNEL_ID:-}",
        "--tenant-id", "${TELEGRAM_TENANT_ID:-}",
        "--persona-slug", "${TELEGRAM_PERSONA_SLUG:-}",
        "--bot-token", "${TELEGRAM_BOT_TOKEN:-}",
        "--redis-url", "redis://redis:6379",
      ]
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["channels"]

  channel-whatsapp:
    build:
      context: ..
      dockerfile: packages/channel-whatsapp/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      WEBHOOK_PORT: "${WHATSAPP_WEBHOOK_PORT:-8091}"
    ports:
      - "${WHATSAPP_WEBHOOK_PORT:-8091}:${WHATSAPP_WEBHOOK_PORT:-8091}"
    command:
      [
        "node", "packages/channel-whatsapp/dist/index.js",
        "--channel-id", "${WHATSAPP_CHANNEL_ID:-}",
        "--tenant-id", "${WHATSAPP_TENANT_ID:-}",
        "--persona-slug", "${WHATSAPP_PERSONA_SLUG:-}",
        "--evolution-url", "${EVOLUTION_API_URL:-http://evolution-api:8080}",
        "--instance-id", "${WHATSAPP_INSTANCE_ID:-}",
        "--webhook-secret", "${WHATSAPP_WEBHOOK_SECRET:-}",
        "--redis-url", "redis://redis:6379",
      ]
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["channels"]

  evolution-api:
    image: atendai/evolution-api:v2.1.2
    profiles: ["channels"]
    ports:
      - "${EVOLUTION_API_PORT:-8082}:8080"
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-undre}:${POSTGRES_PASSWORD:-undre}@postgres:5432/${EVOLUTION_DB:-evolution}
      DATABASE_CONNECTION_DB_NAME: ${EVOLUTION_DB:-evolution}
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-changeme}
      LANGUAGE: en
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evolution_instances:/evolution/instances
    restart: unless-stopped

  # TODO: channel-telegram-mtproto (spec 006 — unimplemented).
  # Uncomment once the MTProto adapter package + Dockerfile exist.
  #
  # channel-telegram-mtproto:
  #   build:
  #     context: ..
  #     dockerfile: packages/channel-telegram-mtproto/Dockerfile
  #   profiles: ["channels"]

volumes:
  pgdata:
  redisdata:
  evolution_instances:
