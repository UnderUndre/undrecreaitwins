# Multi-Channel Gateway — Docker Compose
#
# Each adapter runs as a separate service/process for independent scaling.
# Credentials are NOT in this file — use Docker secrets or environment file
# mounted at runtime (see README.md runbook).
#
# Usage:
#   docker compose -f docker-compose.channels.yml up -d
#
# Required environment variables (per adapter):
#   See each service below for required env vars.
#   Pass via .env file or Docker secrets.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================
  # Phase 1 Channels (completed)
  # =============================================

  channel-discord:
    build:
      context: ../
      dockerfile: packages/channel-discord/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
    env_file:
      - secrets/channel-discord.env
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  channel-slack:
    build:
      context: ../
      dockerfile: packages/channel-slack/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
    env_file:
      - secrets/channel-slack.env
    ports:
      - "3100:3100"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  channel-mattermost:
